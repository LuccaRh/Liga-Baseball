<form id="leagueForm">
  <label>Nome da Liga</label>
  <input type="text" id="leagueName" required>

  <button type="submit">Criar Liga</button>
</form>

<script>
document.getElementById("leagueForm").addEventListener("submit", async function(event) {
  event.preventDefault();

  const name = document.getElementById("leagueName").value;

  const response = await fetch("http://localhost:8000/leagues", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: name
    })
  });

  const data = await response.json();

  alert(data.message);
});
</script>
